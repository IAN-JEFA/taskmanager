<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Pro - Efficient Task Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Task Manager Pro</h1>
            <p>Efficiently manage your tasks with style and ease</p>
        </div>

        <div class="main-grid">
            <!-- Create Task Form -->
            <div class="form-card">
                <h2>➕ Create New Task</h2>
                <form id="taskForm">
                    <div class="form-group">
                        <label>Task Title *</label>
                        <input type="text" id="title" required placeholder="Enter task title">
                    </div>
                    <div class="form-group">
                        <label>Due Date *</label>
                        <input type="date" id="due_date" required>
                    </div>
                    <div class="form-group">
                        <label>Priority *</label>
                        <select id="priority">
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">Create Task</button>
                </form>
            </div>

            <!-- Tasks List -->
            <div class="tasks-container">
                <div class="tasks-header">
                    <h2>📌 My Tasks</h2>
                    <div class="filter-group">
                        <button class="filter-btn active" data-status="all">All</button>
                        <button class="filter-btn" data-status="pending">Pending</button>
                        <button class="filter-btn" data-status="in_progress">In Progress</button>
                        <button class="filter-btn" data-status="done">Done</button>
                        <button class="filter-btn report-btn" id="reportBtn">📊 Daily Report</button>
                    </div>
                </div>
                <div id="tasksList">
                    <div class="loading">Loading tasks...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Report Modal -->
    <div id="reportModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Daily Task Report</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="form-group">
                <label>Select Date</label>
                <input type="date" id="reportDate">
                <button class="btn" style="margin-top: 10px;" onclick="showReport()">Generate Report</button>
            </div>
            <div id="reportContent"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
